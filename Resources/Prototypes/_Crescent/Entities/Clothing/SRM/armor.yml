- type: entity
  parent: [ClothingOuterHardsuitBase, StreeCredRedeemableHigh]
  id: ClothingOuterHardsuitKNCCommand
  name: Special Knight Armor "REGENT" Mk. III
  description: A unique variant of knight armor custom-commissioned for the Regent of House Romaine. Special nanofiber and plas-titan plates, fused into a single unit, are reinforced by nanotubes channeling the wearer's own psionic influence throughout the armor, rendering it not only incredibly durable but also extremely lightweight, barely restricting movement. This is the third model of this armor and the sole surviving specimen – all others, along with their blueprints, were lost in the Abyss alongside the Romaine fleet.  Upon closer inspection, an inscription is engraved on the chestplate - "In morte quoque manebimus tibi servire" (Even in death, we shall remain to serve You).
  components:
  - type: Sprite
    sprite: _Crescent/Clothing/SRM/OuterClothing/mandatecommand.rsi
  - type: Clothing
    sprite: _Crescent/Clothing/SRM/OuterClothing/mandatecommand.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.5
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.6
  - type: DegradeableArmor
    armorMaxHealth: 1000
    armorType: Metallic
    armorRepair: PlasteelPlate
    initialModifiers:
      flatReductions:
        Blunt: 35
        Slash: 35
        Piercing: 45
        Heat: 20
        Caustic: 25
  - type: ClothingSpeedModifier
    walkModifier: 1
    sprintModifier: 1
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuitKNCCommand
  - type: StaticPrice
    price: 5000
  - type: ClothingAddFaction
    faction: DSM

