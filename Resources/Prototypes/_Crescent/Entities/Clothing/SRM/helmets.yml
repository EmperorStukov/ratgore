
- type: entity
  parent: ClothingHeadHelmetBasic
  id: ClothingHeadHelmetHunterBasic
  name: hunter's steel helmet
  description: A steel-beaten ornate helmet, intended for a Hunter. The menacing visor conceals the wearer's face.
  components:
  - type: Sprite
    sprite: _Crescent/Clothing/SRM/Head/helmet.rsi
  - type: Clothing
    sprite: _Crescent/Clothing/SRM/Head/helmet.rsi

## hardsuit helmets

- type: entity
  parent: ClothingHeadHardsuitWithLightBase
  id: ClothingHeadHelmetHardsuitHunter
  categories: [ HideSpawnMenu ]
  name: hunter's hardsuit helmet
  description: Spaceworthy protection for your fragile skull.
  components:
  - type: BreathMask
  - type: Sprite
    sprite: _Crescent/Clothing/SRM/Head/hardsuit.rsi
  - type: Clothing
    sprite: _Crescent/Clothing/SRM/Head/hardsuit.rsi
  - type: Psionic
    removable: false
    roller: false
  - type: PointLight
    radius: 4
    color: "#6d805b"
  - type: PressureProtection
    highPressureMultiplier: 0.08
    lowPressureMultiplier: 1000
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.9
        Piercing: 0.9
        Heat: 0.9

